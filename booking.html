<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#05080d"><title>Book | L.A Motors Stroud</title><style>*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 90% 0,#12345b 0,#05080d 35%);color:#f5f8fc;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:760px;margin:auto;padding:22px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:35px}.brand{font-weight:900}.blue{color:#159dff}a{color:#fff;text-decoration:none}.card{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:24px}h1{font-size:clamp(38px,8vw,66px);letter-spacing:-3px;line-height:.95;margin:12px 0}.muted{color:#93a4b8;line-height:1.6}.eyebrow{color:#159dff;font-size:11px;font-weight:900;letter-spacing:2.5px;text-transform:uppercase}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:25px}label{display:grid;gap:7px;font-size:13px;font-weight:800}.full{grid-column:1/-1}input,select,textarea{width:100%;padding:14px;background:#070c13;border:1px solid rgba(255,255,255,.16);border-radius:11px;color:white;font:inherit}textarea{min-height:110px}.btn{margin-top:18px;width:100%;border:0;border-radius:13px;padding:15px;background:linear-gradient(135deg,#159dff,#0867ff);color:#fff;font-weight:900;font-size:16px}.trust{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}.trust div{padding:12px;text-align:center;border:1px solid rgba(255,255,255,.1);border-radius:13px;color:#93a4b8;font-size:12px}@media(max-width:600px){.grid{grid-template-columns:1fr}.full{grid-column:auto}.trust{grid-template-columns:1fr}.wrap{padding:15px}}</style></head><body><div class="wrap"><div class="top"><div class="brand">L.A MOTORS <span class="blue">CONNECT</span></div><a href="/">← Home</a></div><div class="card"><div class="eyebrow">Real online enquiry</div><h1>Request your<br><span class="blue">booking.</span></h1><p class="muted">Send your details directly to L.A Motors. Liam can review the enquiry and contact you to confirm the appointment.</p><form name="la-motors-booking" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/thanks.html"><input type="hidden" name="form-name" value="la-motors-booking"><p style="display:none"><label>Don’t fill this out: <input name="bot-field"></label></p><div class="grid"><label>Service<select name="service" required><option>Car Keys</option><option>Air-Con Re-Gas</option><option>Diagnostics</option><option>Servicing & Repairs</option><option>MOT Waiting List</option></select></label><label>Preferred date<input name="preferred-date" type="date"></label><label>Your name<input name="name" autocomplete="name" required></label><label>Mobile number<input name="phone" type="tel" autocomplete="tel" required></label><label>Registration<input name="registration" placeholder="AB12 CDE"></label><label>Vehicle<input name="vehicle" placeholder="Ford Focus"></label><label class="full">What do you need help with?<textarea name="notes" placeholder="Tell Liam about the key, fault, repair or service required..."></textarea></label></div><button class="btn" type="submit">Send booking request</button></form><div class="trust"><div>🔒 Secure form</div><div>📱 Mobile friendly</div><div>🔧 Reviewed by L.A Motors</div></div></div></div></body></html>
